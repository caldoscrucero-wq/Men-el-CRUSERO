<style>
/* ===== ESTILO GENERAL ===== */
body {
  margin: 0;
  font-family: 'Arial', sans-serif;
  background-color: #fef5e6; /* Fondo crema */
  color: #3e2f1c; /* Café oscuro */
}
h2 {
  font-family: 'Georgia', serif;
  color: #3e2f1c;
  font-size: 2em;
  margin: 0 0 20px 0;
  position: relative;
}
h2::after {
  content: "";
  display: block;
  width: 100px;
  height: 10px;
  background: #3e2f1c;
  border-radius: 50%;
  position: absolute;
  left: 0;
  bottom: -10px;
}

/* ===== VIDEO ENCABEZADO ===== */
.video-header {
position: relative;
width: 100%;
height: 450px;
overflow: hidden;
}
.video-header video {
width: 100%;
height: 100%;
object-fit: cover;
}
.logo-header {
position: absolute;
top: 10px;
left: 10px;
width: 120px;
}
.eslogan-header {
position: absolute;
bottom: 10px;
left: 10px;
font-size: 1.5em;
font-weight: bold;
}

/* ===== BOTONES SCROLL ===== */
.buttons-container {
display: flex;
overflow-x: auto;
background: #fff3e0;
padding: 10px 0;
}
.buttons-container button {
flex: 0 0 auto;
margin: 0 10px;
padding: 10px 20px;
background-color: #3e2f1c;
color: #fff;
border: none;
border-radius: 10px;
cursor: pointer;
}
.buttons-container button:hover {
background-color: #5a3f28;
}

/* ===== SECCIONES ===== */
.section {
display: flex;
flex-wrap: wrap;
padding: 15px 20px;
border-bottom: 2px solid #e0d6c4;
}
.section-left {
flex: 1 1 300px;
padding-right: 20px;
}
.section-left ul {
list-style: disc;
padding-left: 20px;
}
.section-right {
flex: 1 1 300px;
text-align: center;
}
.section-right img {
max-width: 100%;
border-radius: 10px;
margin-bottom: 10px;
}

/* ===== SUBCATEGORIAS ===== */
.subcategory {
font-weight: bold;
margin: 20px 0 10px 0;
}

/* ===== POSTRES - GRID ===== */
.postres-grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
gap: 10px;
justify-items: center;
margin-bottom: 20px;
}
.postres-grid img {
width: 100px;
border-radius: 10px;
}
.postres-grid span {
display: block;
text-align: center;
margin-top: 5px;
}

/* ===== AVISO ===== */
.aviso {
background-color: #ffdd99;
padding: 15px;
margin-top: 20px;
text-align: center;
font-weight: bold;
border-radius: 10px;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
.section {
flex-direction: column;
}
.section-left, .section-right {
padding: 0;
}
} </style>

</head>
<body>
